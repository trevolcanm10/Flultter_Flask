<!DOCTYPE html>
<html>
<head>
    <title>Mantenimiento de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Mantenimiento de Productos</h2>
    <form method="post">
        <input type="hidden" name="id" id="productoId">
        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" class="form-control" name="nombre" required>
        </div>
        <div class="mb-3">
            <label>Precio</label>
            <input type="number" class="form-control" name="precio" step="0.01" required>
        </div>
        <div class="mb-3">
            <label>Stock</label>
            <input type="number" class="form-control" name="stock" required>
        </div>
        <div class="mb-3">
            <label>Tipo de Producto</label>
            <select name="tipo_producto" class="form-select" required>
                {% for tipo in tipos %}
                <option value="{{ tipo.id }}">{{ tipo.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-success">Guardar</button>
    </form>
    <hr>
    <h4>Lista de Productos</h4>
    <table class="table table-bordered">
        <thead>
            <tr><th>Nombre</th><th>Precio</th><th>Stock</th><th>Tipo</th><th>Acciones</th></tr>
        </thead>
        <tbody>
            {% for p in productos %}
            <tr>
                <td>{{ p.nombre }}</td><td>{{ p.precio }}</td><td>{{ p.stock }}</td><td>{{ p.tipo }}</td>
                <td><a href="/eliminar/{{ p.id }}" class="btn btn-danger btn-sm">Eliminar</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
